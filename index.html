<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Selvia ❤️</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <div class="scene">
      <h1>Hiiii Sayangg cantikkk 💖</h1>
      <p class="sub">Aku ada sesuatu buat sayang hehe ✨</p>

      <div class="env-outer" id="env" onclick="bukaAmplop()">

        <div class="env-flap">
          <div class="env-flap-shape"></div>
        </div>

        <div class="seal" id="seal">
          <svg viewBox="0 0 36 36" width="36" height="36">
            <path d="M18 30 C18 30 4 21 4 12.5 C4 8.4 7.1 5 11 5 C13.9 5 16.4 6.8 18 9.2 C19.6 6.8 22.1 5 25 5 C28.9 5 32 8.4 32 12.5 C32 21 18 30 18 30Z" fill="#fff" stroke="#c2185b" stroke-width="1.5"/>
          </svg>
        </div>

        <div class="env-body">
          <div class="hearts">
            <svg class="h-sm" viewBox="0 0 20 20" width="18" height="18">
              <path d="M10 17 C10 17 2 11 2 6.5 C2 4 3.8 2 6 2 C7.8 2 9.2 3.2 10 4.6 C10.8 3.2 12.2 2 14 2 C16.2 2 18 4 18 6.5 C18 11 10 17 10 17Z" fill="#fff"/>
            </svg>
            <svg class="h-sm" viewBox="0 0 20 20" width="14" height="14">
              <path d="M10 17 C10 17 2 11 2 6.5 C2 4 3.8 2 6 2 C7.8 2 9.2 3.2 10 4.6 C10.8 3.2 12.2 2 14 2 C16.2 2 18 4 18 6.5 C18 11 10 17 10 17Z" fill="#fff"/>
            </svg>
            <svg class="h-sm" viewBox="0 0 20 20" width="18" height="18">
              <path d="M10 17 C10 17 2 11 2 6.5 C2 4 3.8 2 6 2 C7.8 2 9.2 3.2 10 4.6 C10.8 3.2 12.2 2 14 2 C16.2 2 18 4 18 6.5 C18 11 10 17 10 17Z" fill="#fff"/>
            </svg>
          </div>
        </div>

      </div>

      <p class="hint" id="hint">✨ klik amplop nya sayang ✨</p>
    </div>
  </div>

  <script>
    var clicked = false;
    function bukaAmplop() {
      if (clicked) return;
      clicked = true;
      document.getElementById('env').classList.add('open');
      document.getElementById('hint').style.opacity = '0';
      setTimeout(function () {
        window.location.href = 'home.html';
      }, 900);
    }
  </script>
</body>
</html>
